 attach(){if(window.ResizeObserver){new ResizeObserver(()=>this.resize()).observe(this.canvas);}else{window.addEventListener('resize',()=>this.resize());}this.canvas.addEventListener('pointerdown',e=>{this.drag=true;this.canvas.setPointerCapture(e.pointerId);this.last=[e.clientX,e.clientY];});this.canvas.addEventListener('pointerup',()=>{this.drag=false;});this.canvas.addEventListener('pointercancel',()=>{this.drag=false;});this.canvas.addEventListener('pointermove',e=>{if(!this.drag)return;const dx=e.clientX-this.last[0],dy=e.clientY-this.last[1];this.last=[e.clientX,e.clientY];this.ay+=dx*.008;this.ax=clamp(this.ax+dy*.008,-1.35,1.35);this.mark();});this.canvas.addEventListener('wheel',e=>{e.preventDefault();this.setZoom(this.zoom*(e.deltaY<0?1.16:.925));},{passive:false});}
 setZoom(v){this.zoom=clamp(v,.62,5.5);this.mark();}
 resize(){const r=this.canvas.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);this.dpr=dpr;this.canvas.width=Math.max(2,Math.floor(r.width*dpr));this.canvas.height=Math.max(2,Math.floor(r.height*dpr));this.ctx.setTransform(dpr,0,0,dpr,0,0);this.w=r.width;this.h=r.height;this.mark();}
 setData(d){this.d=d;this.R=1+norm(d.eci,'eci')*.8;this.time=0;this.make();this.text();this.mark();}
 setCompare(other){this.compareR=other&&Number.isFinite(other.R)?other.R:null;this.mark();}
 g(){return (0.00018+norm(this.d.H,'H')*0.00115);}
 make(){const rng=mulberry32(hashSeed(this.d.iso3+'_'+this.d.year));const R=this.R;this.p=[];for(const [sub,score,color] of [['reading',this.d.reading,'#7dd3fc'],['math',this.d.math,'#fca5a5'],['science',this.d.science,'#86efac']]){const n=Math.max(0,Math.round(score));for(let i=0;i<n;i++){let [x,y,z]=randomSphere(rng,R*.96);this.p.push({x,y,z,vx:(rng()-.5)*.0006,vy:(rng()-.5)*.0006,vz:(rng()-.5)*.0006,color,sub,m:1});}}}
 text(){const d=this.d;const n=d.N==null?'missing':Number(d.N).toFixed(0);const h=d.H==null?'missing':d.H.toFixed(2);const I=d.I==null?'missing':d.I.toFixed(2);const K=d.K==null?'missing':d.K.toFixed(2);this.title.textContent=`${d.country} · ${d.year}`;this.metrics.innerHTML=`ECI space: ${d.eci.toFixed(2)} · PISA mass dots: ${this.p.length} · N: ${n}<br>R ${Math.round(d.reading)} · M ${Math.round(d.math)} · S ${Math.round(d.science)} · H source: ${h}<br>I: ${I} · K: ${K} · t: ${this.time.toFixed(1)}`;}
 step(dt,scale){const p=this.p,n=p.length,R=this.R;if(!n)return;const g=this.g()*scale, cell=R*.11, stick=R*.035, reach=R*.17;const grid=new Map();const key=(a,b,c)=>a+','+b+','+c;for(let i=0;i<n;i++){const a=p[i],ix=Math.floor(a.x/cell),iy=Math.floor(a.y/cell),iz=Math.floor(a.z/cell),k=key(ix,iy,iz);(grid.get(k)??grid.set(k,[]).get(k)).push(i);}
  // Local mass-to-mass kinematics only: no center force, no down force, no anchors.
  for(let i=0;i<n;i++){const a=p[i],ix=Math.floor(a.x/cell),iy=Math.floor(a.y/cell),iz=Math.floor(a.z/cell);let seen=0;for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++)for(let dz=-1;dz<=1;dz++){const arr=grid.get(key(ix+dx,iy+dy,iz+dz));if(!arr)continue;for(const j of arr){if(j<=i)continue;if(seen++>42)break;const b=p[j];let rx=b.x-a.x,ry=b.y-a.y,rz=b.z-a.z;let r=Math.hypot(rx,ry,rz)+1e-6;if(r>reach)continue;rx/=r;ry/=r;rz/=r;
    // attraction outside sticky range, inelastic sticking inside sticky range
    let f=(r>stick)? g*(1-r/reach)*(1-r/reach) : -g*.08*(stick-r)/stick;
    f=clamp(f,-.00055,.0012); const fx=rx*f,fy=ry*f,fz=rz*f; a.vx+=fx;a.vy+=fy;a.vz+=fz;b.vx-=fx;b.vy-=fy;b.vz-=fz;
    if(r<stick){const avx=(a.vx+b.vx)*.5,avy=(a.vy+b.vy)*.5,avz=(a.vz+b.vz)*.5; a.vx=a.vx*.45+avx*.55; a.vy=a.vy*.45+avy*.55; a.vz=a.vz*.45+avz*.55; b.vx=b.vx*.45+avx*.55; b.vy=b.vy*.45+avy*.55; b.vz=b.vz*.45+avz*.55;}
  }}}
  const damp=.972; for(const a of p){a.vx*=damp;a.vy*=damp;a.vz*=damp;a.x+=a.vx*dt;a.y+=a.vy*dt;a.z+=a.vz*dt;const rr=Math.hypot(a.x,a.y,a.z);if(rr>R){const nx=a.x/rr,ny=a.y/rr,nz=a.z/rr;a.x=nx*R;a.y=ny*R;a.z=nz*R;const vn=a.vx*nx+a.vy*ny+a.vz*nz;if(vn>0){a.vx-=1.7*vn*nx;a.vy-=1.7*vn*ny;a.vz-=1.7*vn*nz;}}}this.time+=dt/60;this.text();this.mark();}
 project(q,baseR=this.R){const r=rot(q,this.ax,this.ay),persp=2.9/(2.9+r.z),s=Math.min(this.w,this.h)*.33*this.zoom/baseR;return {x:this.w/2+r.x*s*persp,y:this.h/2-r.y*s*persp,z:r.z,s:persp};}
 line(a,b,col,w=1,baseR=this.R){const A=this.project({x:a[0],y:a[1],z:a[2]},baseR),B=this.project({x:b[0],y:b[1],z:b[2]},baseR),c=this.ctx;c.strokeStyle=col;c.lineWidth=w;c.beginPath();c.moveTo(A.x,A.y);c.lineTo(B.x,B.y);c.stroke();}
 label(v,t,col){const P=this.project({x:v[0],y:v[1],z:v[2]}),c=this.ctx;c.fillStyle=col;c.font='12px system-ui';c.fillText(t,P.x+5,P.y-5);}
 cube(R,col,w=1,baseR=this.R){const pts=[];for(const x of [-R,R])for(const y of [-R,R])for(const z of [-R,R])pts.push([x,y,z]);for(const [i,j] of [[0,1],[0,2],[0,4],[3,1],[3,2],[3,7],[5,1],[5,4],[5,7],[6,2],[6,4],[6,7]])this.line(pts[i],pts[j],col,w,baseR);}
 render(){if(!this.d)return;const c=this.ctx,dpr=this.dpr||Math.min(devicePixelRatio||1,2);c.setTransform(dpr,0,0,dpr,0,0);c.fillStyle='#ffffff';c.fillRect(0,0,this.w,this.h);const grad=c.createRadialGradient(this.w/2,this.h/2,10,this.w/2,this.h/2,Math.max(this.w,this.h)*.75);grad.addColorStop(0,'#ffffff');grad.addColorStop(1,'#e0f2fe');c.fillStyle=grad;c.fillRect(0,0,this.w,this.h);const R=this.R;this.cube(R,'rgba(30,41,59,.30)',1.1);if(this.compareR){this.cube(this.compareR,'rgba(234,179,8,.032)',0.9,this.R);this.cube(this.compareR*.985,'rgba(250,204,21,.010)',0.45,this.R);}this.line([0,0,0],[R,0,0],'rgba(2,132,199,.95)',2.4);this.label([R,0,0],'reading','#0369a1');this.line([0,0,0],[0,R,0],'rgba(220,38,38,.95)',2.4);this.label([0,R,0],'math','#b91c1c');this.line([0,0,0],[0,0,R],'rgba(22,163,74,.95)',2.4);this.label([0,0,R],'science','#15803d');const arr=this.p.map(p=>{const q=this.project(p);return {p,q};}).sort((a,b)=>a.q.z-b.q.z);for(const it of arr){c.globalAlpha=.9;c.fillStyle=it.p.color;c.beginPath();c.arc(it.q.x,it.q.y,2.05*it.q.s,0,Math.PI*2);c.fill();c.globalAlpha=.22;c.strokeStyle='#0f172a';c.lineWidth=.4;c.stroke();}if(this.compareR){c.globalAlpha=1;this.cube(this.compareR,'rgba(234,179,8,.038)',0.65,this.R);}c.globalAlpha=1;this.dirty=false;}
}
function updateYears(side){const iso=document.getElementById('country'+side).value,ys=yearsByIso[iso]||[],sel=document.getElementById('year'+side),prev=+sel.value;sel.innerHTML='';for(const y of ys){const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o);}sel.value=ys.includes(prev)?prev:(ys.includes(2022)?2022:ys.at(-1));}
function fill(){for(const id of ['countryA','countryB']){const sel=document.getElementById(id);for(const c of countries){const o=document.createElement('option');o.value=c.iso3;o.textContent=c.country;sel.appendChild(o);}}document.getElementById('countryA').value=countries.some(c=>c.iso3==='SRB')?'SRB':countries[0].iso3;document.getElementById('countryB').value=countries.some(c=>c.iso3==='FIN')?'FIN':countries[1].iso3;updateYears('A');updateYears('B');}
const simA=new Sim(document.getElementById('canvasA'),document.getElementById('titleA'),document.getElementById('metricsA'));const simB=new Sim(document.getElementById('canvasB'),document.getElementById('titleB'),document.getElementById('metricsB'));
function syncCompare(){simA.setCompare(simB);simB.setCompare(simA);}
function load(side){const d=byKey.get(document.getElementById('country'+side).value+'_'+document.getElementById('year'+side).value);(side==='A'?simA:simB).setData(d);syncCompare();}
fill();load('A');load('B');syncCompare();for(const s of ['A','B']){document.getElementById('country'+s).addEventListener('change',()=>{updateYears(s);load(s);});document.getElementById('year'+s).addEventListener('change',()=>load(s));}
document.querySelectorAll('.zoomCtl button').forEach(b=>b.addEventListener('click',()=>{const sim=b.dataset.side==='A'?simA:simB;sim.setZoom(sim.zoom*(b.dataset.zoom==='in'?1.22:1/1.16));}));
document.getElementById('reset').onclick=()=>{load('A');load('B');};let playing=false,last=performance.now();document.getElementById('play').onclick=()=>{playing=!playing;document.getElementById('play').textContent=playing?'Pause':'Play';simA.mark();simB.mark();};document.getElementById('step').onclick=()=>{const sc=+document.getElementById('gScale').value;simA.step(8,sc);simB.step(8,sc);simA.render();simB.render();};for(const id of ['gScale','speed'])document.getElementById(id).addEventListener('input',()=>{document.getElementById('gScaleVal').textContent=(+document.getElementById('gScale').value).toFixed(2);document.getElementById('speedVal').textContent=(+document.getElementById('speed').value).toFixed(1);simA.mark();simB.mark();});


const helpOverlay=document.getElementById('helpOverlay'),helpBtn=document.getElementById('helpBtn'),gotIt=document.getElementById('gotIt');
helpOverlay.insertAdjacentHTML('beforeend','<svg class="tourLines" aria-hidden="true"></svg><div class="tourNav"><button id="tourBack" class="secondary" type="button">Back</button><button id="tourNext" type="button">Next</button></div><div id="tourStepLabel" class="tourStepLabel"></div>');
const tourSvg=helpOverlay.querySelector('.tourLines'),tourNext=document.getElementById('tourNext'),tourBack=document.getElementById('tourBack'),tourStepLabel=document.getElementById('tourStepLabel');
let tourPage=0;
const tourItems=[
 {page:0,sel:'.controls',title:'Country / year',text:'Choose each side.',cls:'wide'},
 {page:0,sel:'#reset',title:'Run',text:'Reset, play, or step once.',cls:'small'},
 {page:0,sel:'#gScale',title:'Gravity',text:'Internal pull strength.',cls:'small'},
 {page:0,sel:'#speed',title:'Speed',text:'Animation speed only.',cls:'small'},
 {page:1,sel:'main',title:'Compare views',text:'Left = A. Right = B. Drag to rotate.',cls:'big'},
 {page:1,sel:'.zoomCtl',title:'Zoom',text:'Wheel or + / −.',cls:'small'},
 {page:1,sel:'main',title:'Legend',cls:'legendCard',html:'<div class="legendGrid"><div class="item"><span class="sw r"></span><span><b>Blue</b><br>reading</span></div><div class="item"><span class="sw m"></span><span><b>Red</b><br>math</span></div><div class="item"><span class="sw s"></span><span><b>Green</b><br>science</span></div><div class="item"><span class="sw axis"></span><span><b>Axes</b><br>ECI</span></div><div class="item"><span class="sw dark"></span><span><b>Dark cube</b><br>this size</span></div><div class="item"><span class="sw cube"></span><span><b>Yellow cube</b><br>other size</span></div><div class="item"><span class="sw h"></span><span><b>Dots</b><br>PISA masses</span></div><div class="item"><span class="sw h"></span><span><b>H⁻¹</b><br>gravity</span></div></div>'}
];
function makeBubble(item,i){const b=document.createElement('div');b.className='helpBubble '+(item.cls||'');b.dataset.anchor=item.sel;b.dataset.page=item.page;b.innerHTML='<b><span class="num">'+(i+1)+'</span>'+item.title+'</b>'+(item.text||'')+(item.html||'');helpOverlay.appendChild(b);return b;}
const tourBubbles=tourItems.map(makeBubble);
function targetRect(sel){const el=document.querySelector(sel);if(!el)return {left:innerWidth/2,top:innerHeight/2,width:1,height:1,right:innerWidth/2,bottom:innerHeight/2};return el.getBoundingClientRect();}
function centerOf(r){return {x:r.left+r.width/2,y:r.top+r.height/2};}
function bubbleRect(b){return b.getBoundingClientRect();}
function setBubble(b,x,y){const pad=14,bw=b.offsetWidth||190,bh=b.offsetHeight||70;b.style.left=clamp(x,pad,innerWidth-bw-pad)+'px';b.style.top=clamp(y,pad,innerHeight-bh-pad)+'px';}
function arrowToTarget(b,to){
 const r=bubbleRect(b), from={x:clamp(to.x,r.left+18,r.right-18), y:r.top};
 const dx=to.x-from.x,dy=to.y-from.y,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;
 const start={x:from.x+ux*4,y:from.y+uy*4}, end={x:to.x-ux*10,y:to.y-uy*10};
 const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',start.x);line.setAttribute('y1',start.y);line.setAttribute('x2',end.x);line.setAttribute('y2',end.y);tourSvg.appendChild(line);
 const size=9,px=-uy,py=ux;
 const p1=end,p2={x:end.x-ux*size+px*size*.55,y:end.y-uy*size+py*size*.55},p3={x:end.x-ux*size-px*size*.55,y:end.y-uy*size-py*size*.55};
 const tri=document.createElementNS('http://www.w3.org/2000/svg','polygon');tri.setAttribute('points',`${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`);tourSvg.appendChild(tri);
}
function arrowSide(b,to,side){
 const r=bubbleRect(b); let from={x:r.left+r.width/2,y:r.top};
 if(side==='left')from={x:r.left,y:r.top+r.height/2};
 if(side==='right')from={x:r.right,y:r.top+r.height/2};
 if(side==='bottom')from={x:r.left+r.width/2,y:r.bottom};
 const dx=to.x-from.x,dy=to.y-from.y,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;
 const end={x:to.x-ux*10,y:to.y-uy*10};
 const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',from.x);line.setAttribute('y1',from.y);line.setAttribute('x2',end.x);line.setAttribute('y2',end.y);tourSvg.appendChild(line);
 const size=9,px=-uy,py=ux;
 const tri=document.createElementNS('http://www.w3.org/2000/svg','polygon');tri.setAttribute('points',`${end.x},${end.y} ${end.x-ux*size+px*size*.55},${end.y-uy*size+py*size*.55} ${end.x-ux*size-px*size*.55},${end.y-uy*size-py*size*.55}`);tourSvg.appendChild(tri);
}
function placePage0(){
 const cA=targetRect('#countryA'), yA=targetRect('#yearA'), run=targetRect('#reset'), g=targetRect('#gScale'), sp=targetRect('#speed');
 const mainTop=(document.querySelector('main')?.getBoundingClientRect().top||220);
 const b0=tourBubbles[0], b1=tourBubbles[1], b2=tourBubbles[2], b3=tourBubbles[3];
 const w0=b0.offsetWidth||300,w1=b1.offsetWidth||184,w2=b2.offsetWidth||184,w3=b3.offsetWidth||184;
 // 4 separate zones. No crossing arrows.
 setBubble(b0, Math.max(18, cA.left + cA.width*.42 - w0/2), mainTop + 34);
 setBubble(b1, Math.max(18, run.left + run.width*.5 - w1/2), mainTop + 142);
 setBubble(b2, Math.max(18, g.left + g.width*.5 - w2/2), mainTop + 248);
 setBubble(b3, Math.min(innerWidth-w3-18, sp.left + sp.width*.5 - w3/2), mainTop + 142);
 arrowToTarget(b0,{x:(cA.left+yA.right)/2,y:cA.bottom-6});
 arrowToTarget(b1,{x:run.left+run.width/2,y:run.bottom-5});
 arrowToTarget(b2,{x:g.left+g.width/2,y:g.bottom-5});
 arrowToTarget(b3,{x:sp.left+sp.width/2,y:sp.bottom-5});
}
function placePage1(){
 const left=targetRect('#canvasA'), right=targetRect('#canvasB'), zoom=targetRect('.zoomCtl');
 const viewB=tourBubbles[4], zoomB=tourBubbles[5], legend=tourBubbles[6];
 const vw=viewB.offsetWidth||270, zw=zoomB.offsetWidth||184, lw=legend.offsetWidth||500;
 setBubble(viewB, innerWidth*.5-vw/2, Math.max(left.top+70, innerHeight*.30));
 arrowSide(viewB,{x:left.left+left.width*.55,y:left.top+left.height*.38},'left');
 arrowSide(viewB,{x:right.left+right.width*.45,y:right.top+right.height*.38},'right');
 setBubble(zoomB, Math.min(innerWidth-zw-22,right.right-zw-20), Math.min(innerHeight-160, right.top+right.height*.66));
 arrowSide(zoomB,{x:zoom.left+zoom.width/2,y:zoom.top+zoom.height/2},'bottom');
 setBubble(legend, innerWidth*.5-lw/2, innerHeight-(legend.offsetHeight||92)-18);
}
function layoutHelp(){
 tourSvg.innerHTML='';
 tourBubbles.forEach(b=>b.classList.toggle('hide',Number(b.dataset.page)!==tourPage));
 if(tourPage===0)placePage0(); else placePage1();
 tourBack.style.display=tourPage===0?'none':'inline-block';
 tourNext.textContent=tourPage===0?'Next':'Got it!';
 tourStepLabel.textContent=(tourPage+1)+' / 2';
}
function showHelp(){helpOverlay.classList.add('show');tourPage=0;requestAnimationFrame(layoutHelp);}
function hideHelp(){helpOverlay.classList.remove('show');try{localStorage.setItem('eciHelpSeen','1');}catch(e){}}
helpBtn.addEventListener('click',showHelp);
gotIt.style.display='none';
tourNext.addEventListener('click',()=>{if(tourPage===0){tourPage=1;layoutHelp();}else hideHelp();});
tourBack.addEventListener('click',()=>{tourPage=0;layoutHelp();});
helpOverlay.addEventListener('click',e=>{if(e.target===helpOverlay||e.target.classList.contains('helpShade'))hideHelp();});
window.addEventListener('keydown',e=>{if(e.key==='Escape')hideHelp();});
window.addEventListener('resize',()=>{if(helpOverlay.classList.contains('show'))layoutHelp();});
window.addEventListener('scroll',()=>{if(helpOverlay.classList.contains('show'))layoutHelp();},{passive:true});
try{if(!localStorage.getItem('eciHelpSeen'))showHelp();}catch(e){showHelp();}
function loop(now){const dt=Math.min(28,now-last);last=now;if(playing){const sc=+document.getElementById('gScale').value,sp=+document.getElementById('speed').value;simA.step(dt*sp,sc);simB.step(dt*sp,sc);}if(playing||simA.dirty)simA.render();if(playing||simB.dirty)simB.render();requestAnimationFrame(loop);}requestAnimationFrame(loop);
</script></body></html>
